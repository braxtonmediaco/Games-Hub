<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus Arcade | Game Hub</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Phosphor Icons for UI and Game Graphics -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Outfit:wght@700;900&display=swap" rel="stylesheet">

    <!-- Tailwind Configuration & Custom Styles -->
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        display: ['Outfit', 'sans-serif'],
                    },
                    colors: {
                        darkBg: '#0b0f19',
                        cardBg: '#151e32',
                        brand: '#8b5cf6',
                        brandHover: '#7c3aed',
                        neonBlue: '#00f3ff',
                        neonPink: '#ff00ea'
                    }
                }
            }
        }
    </script>
    <style>
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #0b0f19; }
        ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #334155; }
        
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        /* Hover & Glow Effects */
        .game-card { transition: all 0.3s ease; }
        .game-card:hover { 
            transform: translateY(-5px); 
            box-shadow: 0 10px 30px -10px rgba(139, 92, 246, 0.5); 
        }
        .btn-glow { box-shadow: 0 0 15px rgba(139, 92, 246, 0.6); }
        .btn-glow:hover { box-shadow: 0 0 25px rgba(139, 92, 246, 0.8); }

        /* Game specific styles */
        .ttt-cell { transition: background 0.2s; }
        .ttt-cell:hover { background: #1e293b; }
        .memory-card { transition: transform 0.3s; transform-style: preserve-3d; }
        .memory-card.flipped { transform: rotateY(180deg); }
        .memory-card-front, .memory-card-back { backface-visibility: hidden; }
        .memory-card-front { transform: rotateY(180deg); }
    </style>
</head>
<body class="bg-darkBg text-slate-200 font-sans min-h-screen flex flex-col overflow-x-hidden">

    <!-- Top Navigation -->
    <nav class="sticky top-0 z-40 bg-cardBg/90 backdrop-blur-md border-b border-slate-800 p-4">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <!-- Logo -->
            <div class="flex items-center gap-3 text-2xl font-display font-black text-transparent bg-clip-text bg-gradient-to-r from-neonBlue to-brand tracking-wide">
                <i class="ph-fill ph-game-controller text-brand text-3xl"></i>
                NEXUS ARCADE
            </div>

            <!-- Search Bar (Hidden on small mobile) -->
            <div class="hidden md:flex items-center bg-darkBg border border-slate-700 rounded-full px-4 py-2 w-1/3 focus-within:border-brand transition">
                <i class="ph ph-magnifying-glass text-slate-400 mr-2"></i>
                <input type="text" id="searchInput" placeholder="Search for games..." class="bg-transparent border-none outline-none w-full text-sm text-white placeholder-slate-500">
            </div>

            <!-- User Menu -->
            <div class="flex items-center gap-4">
                <button class="md:hidden p-2 text-slate-400 hover:text-white" onclick="document.getElementById('searchInputMobile').parentElement.classList.toggle('hidden')">
                    <i class="ph ph-magnifying-glass text-xl"></i>
                </button>
                <div class="flex items-center gap-2 cursor-pointer group">
                    <div class="w-10 h-10 rounded-full border-2 border-slate-600 bg-slate-800 flex items-center justify-center group-hover:border-brand transition text-slate-400 group-hover:text-white">
                        <i class="ph-fill ph-user text-xl"></i>
                    </div>
                </div>
            </div>
        </div>
        <!-- Mobile Search Dropdown -->
        <div class="hidden md:hidden mt-4 bg-darkBg border border-slate-700 rounded-full px-4 py-2 w-full">
            <input type="text" id="searchInputMobile" placeholder="Search games..." class="bg-transparent border-none outline-none w-full text-sm text-white placeholder-slate-500">
        </div>
    </nav>

    <!-- Main Content -->
    <main class="flex-grow max-w-7xl mx-auto w-full p-4 md:p-6 lg:p-8">

        <!-- Categories Filter -->
        <div class="flex items-center gap-3 overflow-x-auto no-scrollbar mb-8 pb-2 border-b border-slate-800" id="categoryTabs">
            <!-- Populated via JS -->
        </div>

        <!-- Games Grid -->
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6" id="gamesGrid">
            <!-- Populated via JS -->
        </div>

    </main>

    <!-- Footer -->
    <footer class="bg-cardBg border-t border-slate-800 py-8 text-center text-slate-500 text-sm">
        <p>&copy; 2026 Nexus Arcade. All rights reserved.</p>
        <p class="mt-2">Built for gamers, by gamers.</p>
    </footer>

    <!-- Fullscreen Game Modal -->
    <div id="gameModal" class="fixed inset-0 bg-darkBg/95 backdrop-blur-md z-50 hidden flex-col items-center justify-center opacity-0 transition-opacity duration-300">
        <!-- Modal Header -->
        <div class="absolute top-0 left-0 w-full p-4 flex justify-between items-center bg-cardBg/80 border-b border-slate-800">
            <div class="flex items-center gap-3">
                <div id="modalGameIcon" class="w-10 h-10 rounded bg-brand flex items-center justify-center text-xl text-white"></div>
                <div>
                    <h2 id="modalGameTitle" class="text-white font-bold text-lg">Game Title</h2>
                    <p id="modalGameCategory" class="text-brand text-xs uppercase font-bold">Category</p>
                </div>
            </div>
            <button onclick="closeModal()" class="text-slate-400 hover:text-white bg-slate-800 hover:bg-red-500 hover:text-white rounded-full p-2 transition flex items-center justify-center">
                <i class="ph ph-x text-xl"></i>
            </button>
        </div>

        <!-- Modal Game Container -->
        <div id="gameContainer" class="w-full max-w-4xl h-full mt-20 p-4 flex items-center justify-center">
            <!-- Game UI gets injected here -->
        </div>
    </div>

    <!-- Application Logic -->
    <script>
        // Global variable to track active game loops so we can stop them when the modal closes
        let currentGameInterval = null;

        // --- 1. GAME DATABASE ---
        const gamesDatabase = [
            {
                id: 'clicker',
                title: 'Official Cookie Clicker',
                category: 'Arcade',
                icon: 'ph-cookie',
                gradient: 'from-amber-600 to-yellow-400',
                playable: true,
                desc: 'The original baking game! Click the cookie to bake cookies, then buy upgrades and buildings.'
            },
            {
                id: 'tictactoe',
                title: 'Neon Tic-Tac-Toe',
                category: 'Board',
                icon: 'ph-hash',
                gradient: 'from-blue-600 to-cyan-400',
                playable: true,
                desc: 'The classic game reimagined with a cyberpunk neon aesthetic. Play locally against a friend.'
            },
            {
                id: 'emojimatch',
                title: 'Emoji Memory Match',
                category: 'Puzzle',
                icon: 'ph-brain',
                gradient: 'from-purple-600 to-pink-500',
                playable: true,
                desc: 'Test your cognitive skills. Flip cards to find matching pairs in the fastest time.'
            }
        ];

        const categories = ['All', 'Arcade', 'Puzzle', 'Action', 'Strategy', 'Board'];
        let activeCategory = 'All';
        let searchQuery = '';

        // --- 2. UI RENDERING ---
        
        function renderCategories() {
            const container = document.getElementById('categoryTabs');
            container.innerHTML = '';
            
            categories.forEach(cat => {
                const isActive = activeCategory === cat;
                const btn = document.createElement('button');
                btn.className = `px-5 py-2 rounded-full text-sm font-bold transition whitespace-nowrap ${
                    isActive 
                    ? 'bg-brand text-white shadow-[0_0_10px_rgba(139,92,246,0.5)]' 
                    : 'bg-transparent text-slate-400 hover:text-white hover:bg-slate-800'
                }`;
                btn.innerText = cat;
                btn.onclick = () => {
                    activeCategory = cat;
                    renderCategories();
                    renderGames();
                };
                container.appendChild(btn);
            });
        }

        function renderGames() {
            const grid = document.getElementById('gamesGrid');
            grid.innerHTML = '';

            const filteredGames = gamesDatabase.filter(game => {
                const matchesCategory = activeCategory === 'All' || game.category === activeCategory;
                const matchesSearch = game.title.toLowerCase().includes(searchQuery.toLowerCase()) || 
                                      game.desc.toLowerCase().includes(searchQuery.toLowerCase());
                return matchesCategory && matchesSearch;
            });

            if (filteredGames.length === 0) {
                grid.innerHTML = `<div class="col-span-full text-center py-12 text-slate-500">
                    <i class="ph-duotone ph-ghost text-6xl mb-4"></i>
                    <p>No games found matching your criteria.</p>
                </div>`;
                return;
            }

            filteredGames.forEach(game => {
                const playableBadge = game.playable 
                    ? `<span class="absolute top-3 right-3 bg-green-500/20 text-green-400 text-xs font-bold px-2 py-1 rounded border border-green-500/30 backdrop-blur">PLAYABLE</span>` 
                    : `<span class="absolute top-3 right-3 bg-slate-800/80 text-slate-400 text-xs font-bold px-2 py-1 rounded border border-slate-700 backdrop-blur">COMING SOON</span>`;

                const cardHTML = `
                    <div class="game-card bg-cardBg rounded-2xl overflow-hidden border border-slate-800 flex flex-col h-full cursor-pointer group" onclick="openGame('${game.id}')">
                        <!-- Thumbnail Area -->
                        <div class="h-40 bg-gradient-to-br ${game.gradient} relative flex items-center justify-center overflow-hidden">
                            ${playableBadge}
                            <i class="ph-duotone ${game.icon} text-7xl text-white/50 group-hover:scale-110 group-hover:text-white transition duration-300"></i>
                            <div class="absolute inset-0 bg-gradient-to-t from-cardBg to-transparent opacity-80"></div>
                        </div>
                        
                        <!-- Content Area -->
                        <div class="p-5 flex flex-col flex-grow">
                            <div class="text-xs font-bold text-brand uppercase tracking-wider mb-1">${game.category}</div>
                            <h3 class="text-xl font-bold text-white mb-2 group-hover:text-neonBlue transition">${game.title}</h3>
                            <p class="text-slate-400 text-sm flex-grow line-clamp-2">${game.desc}</p>
                            
                            <!-- Play Button -->
                            <div class="mt-4 flex items-center gap-2 text-sm font-bold ${game.playable ? 'text-white' : 'text-slate-500 group-hover:text-slate-300'} transition">
                                <i class="${game.playable ? 'ph-fill ph-play-circle text-brand' : 'ph ph-clock'} text-xl"></i>
                                ${game.playable ? 'Launch Game' : 'View Details'}
                            </div>
                        </div>
                    </div>
                `;
                grid.innerHTML += cardHTML;
            });
        }

        // --- 3. EVENT LISTENERS ---

        const handleSearch = (e) => {
            searchQuery = e.target.value;
            renderGames();
        };

        document.getElementById('searchInput').addEventListener('input', handleSearch);
        document.getElementById('searchInputMobile').addEventListener('input', handleSearch);

        // --- 4. MODAL & GAME LAUNCHER LOGIC ---
        
        const modal = document.getElementById('gameModal');
        const gameContainer = document.getElementById('gameContainer');

        function openGame(gameId) {
            const game = gamesDatabase.find(g => g.id === gameId);
            if (!game) return;

            // Setup Header
            document.getElementById('modalGameTitle').innerText = game.title;
            document.getElementById('modalGameCategory').innerText = game.category;
            const iconDiv = document.getElementById('modalGameIcon');
            iconDiv.className = `w-10 h-10 rounded flex items-center justify-center text-xl text-white bg-gradient-to-br ${game.gradient}`;
            iconDiv.innerHTML = `<i class="ph-fill ${game.icon}"></i>`;

            // Clear container
            gameContainer.innerHTML = '';

            if (game.playable) {
                if (game.id === 'tictactoe') initTicTacToe();
                else if (game.id === 'emojimatch') initEmojiMatch();
                else if (game.id === 'clicker') initClickerGame();
            } else {
                // Show Coming Soon state
                gameContainer.innerHTML = `
                    <div class="text-center bg-cardBg border border-slate-700 p-12 rounded-2xl max-w-lg w-full">
                        <i class="ph-duotone ${game.icon} text-8xl text-slate-600 mb-6 block"></i>
                        <h2 class="text-3xl font-display font-bold text-white mb-4">Under Construction</h2>
                        <p class="text-slate-400 mb-8">${game.title} is currently in development. Our cyber-monkeys are coding furiously. Check back soon!</p>
                        <button onclick="closeModal()" class="bg-slate-700 hover:bg-slate-600 text-white font-bold py-2 px-6 rounded-lg transition">
                            Return to Hub
                        </button>
                    </div>
                `;
            }

            // Show Modal
            modal.classList.remove('hidden');
            // Small delay to trigger opacity transition
            setTimeout(() => {
                modal.classList.remove('opacity-0');
            }, 10);
            
            document.body.style.overflow = 'hidden'; // Prevent background scrolling
        }

        function closeModal() {
            modal.classList.add('opacity-0');
            setTimeout(() => {
                modal.classList.add('hidden');
                gameContainer.innerHTML = ''; // Clean up memory
                
                // Stop any running game loops
                if (currentGameInterval) {
                    clearInterval(currentGameInterval);
                    currentGameInterval = null;
                }

                document.body.style.overflow = 'auto';
            }, 300); // match transition duration
        }

        // --- 5. MINI-GAMES IMPLEMENTATION ---

        // Game 0: Official Cookie Clicker (Embed)
        function initClickerGame() {
            const html = `
                <div id="clicker-card" class="flex flex-col items-center bg-cardBg p-4 sm:p-6 rounded-2xl border border-slate-700 shadow-2xl w-full h-[80vh] max-w-5xl transition-all duration-300">
                    
                    <!-- Toolbar -->
                    <div class="flex justify-between items-center w-full mb-4">
                        <div class="flex items-center gap-2">
                            <i class="ph-duotone ph-cookie text-2xl text-yellow-500"></i>
                            <h3 class="text-white font-bold text-lg">Cookie Clicker Web</h3>
                        </div>
                        <button id="btn-fullscreen" class="bg-brand hover:bg-brandHover text-white font-bold py-2 px-4 rounded-lg flex items-center gap-2 transition text-sm shadow-lg">
                            <i id="fs-icon" class="ph-bold ph-corners-out"></i> <span id="fs-text">Maximize</span>
                        </button>
                    </div>

                    <!-- Game Iframe -->
                    <div class="w-full flex-grow relative rounded-xl overflow-hidden border border-slate-800 bg-black">
                        <iframe id="cookie-iframe" src="cookieclicker.html" class="absolute inset-0 w-full h-full border-0"></iframe>
                    </div>

                </div>
            `;
            
            gameContainer.innerHTML = html;

            // Fullscreen Logic (CSS Simulated)
            const fullscreenBtn = document.getElementById('btn-fullscreen');
            const clickerCard = document.getElementById('clicker-card');
            const fsIcon = document.getElementById('fs-icon');
            const fsText = document.getElementById('fs-text');
            let isMaximized = false;

            fullscreenBtn.addEventListener('click', () => {
                isMaximized = !isMaximized;
                if (isMaximized) {
                    // Simulate fullscreen using CSS to bypass iframe permissions
                    clickerCard.classList.remove('h-[80vh]', 'max-w-5xl', 'rounded-2xl', 'p-4', 'sm:p-6', 'border', 'border-slate-700', 'shadow-2xl');
                    clickerCard.classList.add('fixed', 'inset-0', 'z-[60]', 'h-full', 'w-full', 'p-2', 'bg-darkBg');
                    fsIcon.classList.replace('ph-corners-out', 'ph-corners-in');
                    fsText.innerText = 'Restore';
                } else {
                    clickerCard.classList.add('h-[80vh]', 'max-w-5xl', 'rounded-2xl', 'p-4', 'sm:p-6', 'border', 'border-slate-700', 'shadow-2xl');
                    clickerCard.classList.remove('fixed', 'inset-0', 'z-[60]', 'h-full', 'w-full', 'p-2', 'bg-darkBg');
                    fsIcon.classList.replace('ph-corners-in', 'ph-corners-out');
                    fsText.innerText = 'Maximize';
                }
            });
        }

        // Game 1: Neon Tic-Tac-Toe
        function initTicTacToe() {
            let board = ['', '', '', '', '', '', '', '', ''];
            let currentPlayer = 'X';
            let gameActive = true;

            const html = `
                <div class="flex flex-col items-center bg-cardBg p-8 rounded-2xl border border-slate-700 shadow-2xl max-w-md w-full">
                    <div class="flex justify-between w-full mb-8">
                        <div class="text-center">
                            <span class="text-xs text-slate-400 font-bold uppercase tracking-widest block mb-1">Player 1</span>
                            <span class="text-4xl font-black text-neonBlue" style="text-shadow: 0 0 10px rgba(0,243,255,0.5)">X</span>
                        </div>
                        <div class="text-center">
                            <span class="text-xs text-slate-400 font-bold uppercase tracking-widest block mb-1">Player 2</span>
                            <span class="text-4xl font-black text-neonPink" style="text-shadow: 0 0 10px rgba(255,0,234,0.5)">O</span>
                        </div>
                    </div>
                    
                    <div id="ttt-status" class="text-xl font-bold mb-6 text-white h-8">Player <span class="${currentPlayer === 'X' ? 'text-neonBlue' : 'text-neonPink'}">${currentPlayer}</span>'s Turn</div>
                    
                    <div class="grid grid-cols-3 gap-3 bg-slate-800 p-3 rounded-xl mb-8">
                        ${[0,1,2,3,4,5,6,7,8].map(i => `
                            <button id="cell-${i}" class="ttt-cell w-20 h-20 sm:w-24 sm:h-24 bg-darkBg rounded-lg flex items-center justify-center text-5xl font-black cursor-pointer shadow-inner"></button>
                        `).join('')}
                    </div>
                    
                    <button id="ttt-reset" class="bg-slate-700 hover:bg-slate-600 text-white font-bold py-2 px-8 rounded-full transition w-full">Restart Game</button>
                </div>
            `;
            gameContainer.innerHTML = html;

            const statusDisplay = document.getElementById('ttt-status');
            const cells = document.querySelectorAll('.ttt-cell');
            
            const winningConditions = [
                [0, 1, 2], [3, 4, 5], [6, 7, 8], // Rows
                [0, 3, 6], [1, 4, 7], [2, 5, 8], // Cols
                [0, 4, 8], [2, 4, 6]             // Diagonals
            ];

            function handleCellClick(e) {
                const cell = e.target;
                const cellIndex = parseInt(cell.id.split('-')[1]);

                if (board[cellIndex] !== '' || !gameActive) return;

                board[cellIndex] = currentPlayer;
                cell.innerText = currentPlayer;
                cell.classList.add(currentPlayer === 'X' ? 'text-neonBlue' : 'text-neonPink');
                if(currentPlayer === 'X') {
                    cell.style.textShadow = '0 0 15px rgba(0,243,255,0.7)';
                } else {
                    cell.style.textShadow = '0 0 15px rgba(255,0,234,0.7)';
                }

                checkWin();
            }

            function checkWin() {
                let roundWon = false;
                for (let i = 0; i <= 7; i++) {
                    const winCondition = winningConditions[i];
                    let a = board[winCondition[0]];
                    let b = board[winCondition[1]];
                    let c = board[winCondition[2]];
                    if (a === '' || b === '' || c === '') continue;
                    if (a === b && b === c) {
                        roundWon = true;
                        break;
                    }
                }

                if (roundWon) {
                    statusDisplay.innerHTML = `<span class="${currentPlayer === 'X' ? 'text-neonBlue' : 'text-neonPink'}">Player ${currentPlayer} Wins!</span>`;
                    gameActive = false;
                    return;
                }

                let roundDraw = !board.includes('');
                if (roundDraw) {
                    statusDisplay.innerHTML = 'Game ended in a Draw!';
                    gameActive = false;
                    return;
                }

                currentPlayer = currentPlayer === 'X' ? 'O' : 'X';
                statusDisplay.innerHTML = `Player <span class="${currentPlayer === 'X' ? 'text-neonBlue' : 'text-neonPink'}">${currentPlayer}</span>'s Turn`;
            }

            cells.forEach(cell => cell.addEventListener('click', handleCellClick));
            
            document.getElementById('ttt-reset').addEventListener('click', () => {
                board = ['', '', '', '', '', '', '', '', ''];
                currentPlayer = 'X';
                gameActive = true;
                statusDisplay.innerHTML = `Player <span class="text-neonBlue">X</span>'s Turn`;
                cells.forEach(cell => {
                    cell.innerText = '';
                    cell.className = 'ttt-cell w-20 h-20 sm:w-24 sm:h-24 bg-darkBg rounded-lg flex items-center justify-center text-5xl font-black cursor-pointer shadow-inner';
                    cell.style.textShadow = 'none';
                });
            });
        }

        // Game 2: Emoji Memory Match
        function initEmojiMatch() {
            const emojis = ['👾', '🤖', '🚀', '👽', '🛸', '🕹️', '🔮', '🔋'];
            let cardsArray = [...emojis, ...emojis];
            let flippedCards = [];
            let matchedCount = 0;
            let canFlip = true;
            let moves = 0;

            // Shuffle
            cardsArray.sort(() => 0.5 - Math.random());

            const html = `
                <div class="flex flex-col items-center bg-cardBg p-6 sm:p-8 rounded-2xl border border-slate-700 shadow-2xl max-w-xl w-full">
                    <div class="flex justify-between items-center w-full mb-6 text-white font-bold">
                        <div class="text-lg bg-slate-800 px-4 py-2 rounded-lg border border-slate-700">Moves: <span id="mem-moves" class="text-brand">0</span></div>
                        <button id="mem-reset" class="bg-brand hover:bg-brandHover py-2 px-4 rounded-lg transition text-sm">Restart</button>
                    </div>
                    
                    <div id="mem-grid" class="grid grid-cols-4 gap-2 sm:gap-4 w-full">
                        ${cardsArray.map((emoji, i) => `
                            <div class="memory-card relative w-16 h-16 sm:w-20 sm:h-20 sm:h-24 cursor-pointer" data-index="${i}" data-emoji="${emoji}">
                                <div class="memory-card-front absolute inset-0 bg-gradient-to-br from-brand to-purple-600 rounded-xl flex items-center justify-center text-3xl sm:text-4xl shadow-lg border border-purple-400/30">
                                    ${emoji}
                                </div>
                                <div class="memory-card-back absolute inset-0 bg-slate-800 rounded-xl flex items-center justify-center border border-slate-700 shadow-inner hover:bg-slate-700 transition">
                                    <i class="ph-fill ph-question text-slate-500 text-2xl"></i>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                    
                    <div id="mem-win" class="hidden mt-6 text-center">
                        <h3 class="text-2xl font-black text-transparent bg-clip-text bg-gradient-to-r from-green-400 to-emerald-600 mb-2">Memory Master!</h3>
                        <p class="text-slate-400 text-sm">You completed the grid.</p>
                    </div>
                </div>
            `;
            gameContainer.innerHTML = html;

            const cards = document.querySelectorAll('.memory-card');
            const movesDisplay = document.getElementById('mem-moves');
            const winDisplay = document.getElementById('mem-win');

            function flipCard(e) {
                const card = e.currentTarget;
                
                if (!canFlip || card.classList.contains('flipped') || flippedCards.includes(card)) return;

                card.classList.add('flipped');
                flippedCards.push(card);

                if (flippedCards.length === 2) {
                    canFlip = false;
                    moves++;
                    movesDisplay.innerText = moves;
                    checkMatch();
                }
            }

            function checkMatch() {
                const [card1, card2] = flippedCards;
                const match = card1.dataset.emoji === card2.dataset.emoji;

                if (match) {
                    matchedCount += 2;
                    flippedCards = [];
                    canFlip = true;
                    if (matchedCount === cardsArray.length) {
                        winDisplay.classList.remove('hidden');
                    }
                } else {
                    setTimeout(() => {
                        card1.classList.remove('flipped');
                        card2.classList.remove('flipped');
                        flippedCards = [];
                        canFlip = true;
                    }, 1000);
                }
            }

            cards.forEach(card => card.addEventListener('click', flipCard));
            
            document.getElementById('mem-reset').addEventListener('click', () => {
                initEmojiMatch(); // Simply re-initialize the game
            });
        }

        // --- 6. INITIALIZATION ---
        
        renderCategories();
        renderGames();

    </script>
