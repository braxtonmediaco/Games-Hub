<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus Arcade | Game Hub</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Phosphor Icons for UI and Game Graphics -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Outfit:wght@700;900&display=swap" rel="stylesheet">

    <!-- Tailwind Configuration & Custom Styles -->
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        display: ['Outfit', 'sans-serif'],
                    },
                    colors: {
                        darkBg: '#0b0f19',
                        cardBg: '#151e32',
                        brand: '#8b5cf6',
                        brandHover: '#7c3aed',
                        neonBlue: '#00f3ff',
                        neonPink: '#ff00ea'
                    }
                }
            }
        }
    </script>
    <style>
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #0b0f19; }
        ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #334155; }
        
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        /* Hover & Glow Effects */
        .game-card { transition: all 0.3s ease; }
        .game-card:hover { 
            transform: translateY(-5px); 
            box-shadow: 0 10px 30px -10px rgba(139, 92, 246, 0.5); 
        }
        .btn-glow { box-shadow: 0 0 15px rgba(139, 92, 246, 0.6); }
        .btn-glow:hover { box-shadow: 0 0 25px rgba(139, 92, 246, 0.8); }

        /* Game specific styles */
        .ttt-cell { transition: background 0.2s; }
        .ttt-cell:hover { background: #1e293b; }
        .memory-card { transition: transform 0.3s; transform-style: preserve-3d; }
        .memory-card.flipped { transform: rotateY(180deg); }
        .memory-card-front, .memory-card-back { backface-visibility: hidden; }
        .memory-card-front { transform: rotateY(180deg); }
    </style>
</head>
<body class="bg-darkBg text-slate-200 font-sans min-h-screen flex flex-col overflow-x-hidden">

    <!-- Top Navigation -->
    <nav id="topNav" class="sticky top-0 z-40 bg-cardBg/90 backdrop-blur-md border-b border-slate-800 p-4 transition-all">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <!-- Logo -->
            <div class="flex items-center gap-3 text-2xl font-display font-black text-transparent bg-clip-text bg-gradient-to-r from-neonBlue to-brand tracking-wide">
                <i class="ph-fill ph-game-controller text-brand text-3xl"></i>
                NEXUS ARCADE
            </div>

            <!-- Search Bar (Hidden on small mobile) -->
            <div class="hidden md:flex items-center bg-darkBg border border-slate-700 rounded-full px-4 py-2 w-1/3 focus-within:border-brand transition">
                <i class="ph ph-magnifying-glass text-slate-400 mr-2"></i>
                <input type="text" id="searchInput" placeholder="Search for games..." class="bg-transparent border-none outline-none w-full text-sm text-white placeholder-slate-500">
            </div>

            <!-- User Menu -->
            <div class="flex items-center gap-4">
                <button class="md:hidden p-2 text-slate-400 hover:text-white" onclick="document.getElementById('searchInputMobile').parentElement.classList.toggle('hidden')">
                    <i class="ph ph-magnifying-glass text-xl"></i>
                </button>
                <div class="flex items-center gap-2 cursor-pointer group">
                    <div class="w-10 h-10 rounded-full border-2 border-slate-600 bg-slate-800 flex items-center justify-center group-hover:border-brand transition text-slate-400 group-hover:text-white">
                        <i class="ph-fill ph-user text-xl"></i>
                    </div>
                </div>
            </div>
        </div>
        <!-- Mobile Search Dropdown -->
        <div class="hidden md:hidden mt-4 bg-darkBg border border-slate-700 rounded-full px-4 py-2 w-full">
            <input type="text" id="searchInputMobile" placeholder="Search games..." class="bg-transparent border-none outline-none w-full text-sm text-white placeholder-slate-500">
        </div>
    </nav>

    <!-- HUB VIEW -->
    <main id="hubView" class="flex-grow max-w-7xl mx-auto w-full p-4 md:p-6 lg:p-8 transition-all">
        <!-- Categories Filter -->
        <div class="flex items-center gap-3 overflow-x-auto no-scrollbar mb-8 pb-2 border-b border-slate-800" id="categoryTabs">
            <!-- Populated via JS -->
        </div>

        <!-- Games Grid -->
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6" id="gamesGrid">
            <!-- Populated via JS -->
        </div>
    </main>

    <!-- PLAYER VIEW (Hidden by Default) -->
    <main id="playerView" class="hidden flex-grow w-full max-w-6xl mx-auto p-4 md:p-6 flex flex-col transition-all duration-300">
        
        <!-- Back Button & Header -->
        <div class="mb-4">
            <button onclick="closeGame()" class="flex items-center gap-2 text-slate-400 hover:text-white transition group w-max">
                <div class="bg-slate-800 p-2 rounded-full group-hover:bg-brand transition">
                    <i class="ph-bold ph-arrow-left text-lg group-hover:text-white"></i>
                </div>
                <span class="font-bold hidden sm:inline">Back to Arcade</span>
            </button>
        </div>

        <div class="w-full flex justify-between items-end mb-6 border-b border-slate-800 pb-4">
            <div class="flex items-center gap-4">
                <div id="gameIcon" class="w-12 h-12 sm:w-16 sm:h-16 rounded-xl flex items-center justify-center text-3xl text-white shadow-lg bg-slate-800"></div>
                <div>
                    <p id="gameCategory" class="text-brand text-xs uppercase font-bold tracking-widest mb-1"></p>
                    <h1 id="gameTitle" class="text-2xl sm:text-4xl font-display font-black text-white"></h1>
                </div>
            </div>
            <button id="btn-fullscreen" class="bg-slate-800 hover:bg-brand text-white font-bold py-2 px-4 rounded-lg flex items-center gap-2 transition text-sm shadow-lg border border-slate-700 hover:border-brand">
                <i id="fs-icon" class="ph-bold ph-corners-out text-lg"></i> <span id="fs-text" class="hidden sm:inline">Maximize</span>
            </button>
        </div>

        <!-- Game Container -->
        <div id="gameWrapper" class="w-full flex-grow flex items-center justify-center relative">
            <div id="gameContainer" class="w-full flex justify-center items-center">
                <!-- Game UI gets injected here -->
            </div>
        </div>

    </main>

    <!-- Footer -->
    <footer class="bg-cardBg border-t border-slate-800 py-8 text-center text-slate-500 text-sm">
        <p>&copy; 2026 Nexus Arcade. All rights reserved.</p>
        <p class="mt-2">Built for gamers, by gamers.</p>
    </footer>

    <!-- Application Logic -->
    <script>
        // --- 1. GAME DATABASE ---
        const gamesDatabase = [
            {
                id: 'clicker',
                title: 'Official Cookie Clicker',
                category: 'Arcade',
                icon: 'ph-cookie',
                gradient: 'from-amber-600 to-yellow-400',
                playable: true,
                desc: 'The original baking game! Click the cookie to bake cookies, then buy upgrades and buildings.'
            },
            {
                id: 'tictactoe',
                title: 'Neon Tic-Tac-Toe',
                category: 'Board',
                icon: 'ph-hash',
                gradient: 'from-blue-600 to-cyan-400',
                playable: true,
                desc: 'The classic game reimagined with a cyberpunk neon aesthetic. Play locally against a friend.'
            },
            {
                id: 'emojimatch',
                title: 'Emoji Memory Match',
                category: 'Puzzle',
                icon: 'ph-brain',
                gradient: 'from-purple-600 to-pink-500',
                playable: true,
                desc: 'Test your cognitive skills. Flip cards to find matching pairs in the fastest time.'
            }
        ];

        const categories = ['All', 'Arcade', 'Puzzle', 'Action', 'Strategy', 'Board'];
        let activeCategory = 'All';
        let searchQuery = '';

        // --- 2. UI RENDERING ---
        
        function renderCategories() {
            const container = document.getElementById('categoryTabs');
            container.innerHTML = '';
            
            categories.forEach(cat => {
                const isActive = activeCategory === cat;
                const btn = document.createElement('button');
                btn.className = `px-5 py-2 rounded-full text-sm font-bold transition whitespace-nowrap ${
                    isActive 
                    ? 'bg-brand text-white shadow-[0_0_10px_rgba(139,92,246,0.5)]' 
                    : 'bg-transparent text-slate-400 hover:text-white hover:bg-slate-800'
                }`;
                btn.innerText = cat;
                btn.onclick = () => {
                    activeCategory = cat;
                    renderCategories();
                    renderGames();
                };
                container.appendChild(btn);
            });
        }

        function renderGames() {
            const grid = document.getElementById('gamesGrid');
            grid.innerHTML = '';

            const filteredGames = gamesDatabase.filter(game => {
                const matchesCategory = activeCategory === 'All' || game.category === activeCategory;
                const matchesSearch = game.title.toLowerCase().includes(searchQuery.toLowerCase()) || 
                                      game.desc.toLowerCase().includes(searchQuery.toLowerCase());
                return matchesCategory && matchesSearch;
            });

            if (filteredGames.length === 0) {
                grid.innerHTML = `<div class="col-span-full text-center py-12 text-slate-500">
                    <i class="ph-duotone ph-ghost text-6xl mb-4"></i>
                    <p>No games found matching your criteria.</p>
                </div>`;
                return;
            }

            filteredGames.forEach(game => {
                const cardHTML = `
                    <div class="game-card bg-cardBg rounded-2xl overflow-hidden border border-slate-800 flex flex-col h-full cursor-pointer group" onclick="openGame('${game.id}')">
                        <!-- Thumbnail Area -->
                        <div class="h-40 bg-gradient-to-br ${game.gradient} relative flex items-center justify-center overflow-hidden">
                            <span class="absolute top-3 right-3 bg-green-500/20 text-green-400 text-xs font-bold px-2 py-1 rounded border border-green-500/30 backdrop-blur">PLAYABLE</span>
                            <i class="ph-duotone ${game.icon} text-7xl text-white/50 group-hover:scale-110 group-hover:text-white transition duration-300"></i>
                            <div class="absolute inset-0 bg-gradient-to-t from-cardBg to-transparent opacity-80"></div>
                        </div>
                        
                        <!-- Content Area -->
                        <div class="p-5 flex flex-col flex-grow">
                            <div class="text-xs font-bold text-brand uppercase tracking-wider mb-1">${game.category}</div>
                            <h3 class="text-xl font-bold text-white mb-2 group-hover:text-neonBlue transition">${game.title}</h3>
                            <p class="text-slate-400 text-sm flex-grow line-clamp-2">${game.desc}</p>
                            
                            <!-- Play Button -->
                            <div class="mt-4 flex items-center gap-2 text-sm font-bold text-white transition">
                                <i class="ph-fill ph-play-circle text-brand text-xl"></i> Launch Game
                            </div>
                        </div>
                    </div>
                `;
                grid.innerHTML += cardHTML;
            });
        }

        // --- 3. EVENT LISTENERS ---

        const handleSearch = (e) => {
            searchQuery = e.target.value;
            renderGames();
        };

        document.getElementById('searchInput').addEventListener('input', handleSearch);
        document.getElementById('searchInputMobile').addEventListener('input', handleSearch);

        // --- 4. GAME LAUNCHER (SINGLE PAGE APP LOGIC) ---
        
        const hubView = document.getElementById('hubView');
        const playerView = document.getElementById('playerView');
        const topNav = document.getElementById('topNav');

        function openGame(gameId) {
            const game = gamesDatabase.find(g => g.id === gameId);
            if (!game) return;

            // Setup Player Header
            document.getElementById('gameTitle').innerText = game.title;
            document.getElementById('gameCategory').innerText = game.category;
            
            const iconDiv = document.getElementById('gameIcon');
            iconDiv.className = `w-12 h-12 sm:w-16 sm:h-16 rounded-xl flex items-center justify-center text-3xl text-white bg-gradient-to-br ${game.gradient} shadow-lg shadow-brand/20`;
            iconDiv.innerHTML = `<i class="ph-fill ${game.icon}"></i>`;

            // Clear previous game content
            document.getElementById('gameContainer').innerHTML = '';

            // Switch views natively without changing URL
            hubView.classList.add('hidden');
            playerView.classList.remove('hidden');
            window.scrollTo(0, 0);

            // Initialize Game
            if (game.id === 'clicker') initClickerGame();
            if (game.id === 'tictactoe') initTicTacToe();
            if (game.id === 'emojimatch') initEmojiMatch();
        }

        function closeGame() {
            // Clean up memory and running iframes
            document.getElementById('gameContainer').innerHTML = '';
            
            // Switch back to hub
            playerView.classList.add('hidden');
            hubView.classList.remove('hidden');

            // Restore if maximized
            if (isMaximized) toggleFullscreen();
        }

        // --- 5. FULLSCREEN MAXIMIZE LOGIC ---
        
        let isMaximized = false;
        const fullscreenBtn = document.getElementById('btn-fullscreen');
        const fsIcon = document.getElementById('fs-icon');
        const fsText = document.getElementById('fs-text');

        function toggleFullscreen() {
            isMaximized = !isMaximized;
            if (isMaximized) {
                playerView.classList.add('fixed', 'inset-0', 'z-50', 'bg-darkBg', 'max-w-none', 'p-2');
                playerView.classList.remove('max-w-6xl', 'mx-auto', 'p-4', 'md:p-6');
                fsIcon.classList.replace('ph-corners-out', 'ph-corners-in');
                fsText.innerText = 'Restore';
                fullscreenBtn.classList.add('bg-brand', 'border-brand');
                topNav.classList.add('hidden'); // Hide main nav
            } else {
                playerView.classList.remove('fixed', 'inset-0', 'z-50', 'bg-darkBg', 'max-w-none', 'p-2');
                playerView.classList.add('max-w-6xl', 'mx-auto', 'p-4', 'md:p-6');
                fsIcon.classList.replace('ph-corners-in', 'ph-corners-out');
                fsText.innerText = 'Maximize';
                fullscreenBtn.classList.remove('bg-brand', 'border-brand');
                topNav.classList.remove('hidden'); // Show main nav
            }
        }

        fullscreenBtn.addEventListener('click', toggleFullscreen);

        // --- 6. GAME INITIALIZERS ---

        function initClickerGame() {
            const html = `
                <div class="w-full h-[75vh] flex flex-col rounded-xl overflow-hidden border border-slate-700 shadow-2xl bg-black">
                    <iframe id="cookie-iframe" class="w-full h-full border-0"></iframe>
                </div>
            `;
            document.getElementById('gameContainer').innerHTML = html;

            // We inject the game directly into the iframe using srcdoc, avoiding the need for a second file!
            const iframe = document.getElementById('cookie-iframe');
            const cookieHtml = `<!DOCTYPE html>
<html>
<head>
    <base href="https://orteil.dashnet.org/cookieclicker/">
    <script>
        var VERSION=2.058;
        var BETA=0;
        var SAVESUFFIX='';
        var App=typeof App==='undefined'?0:App;
        var PRESETMODS=[];
        var LOCAL=true;
    <\/script>
    <title>Cookie Clicker</title>
    <meta name="viewport" content="width=900, initial-scale=1">
    <link rel="shortcut icon" href="img/favicon.ico" />
    <script src="base64.js"><\/script>
    <link href="style.css?v=10c" rel="stylesheet" type="text/css">
    <script src="main.js?v=13g"><\/script>
</head>
<body>
    <div id="wrapper">
        <div id="topBar">
            <div style="padding:0px;height:100%;"><a style="background:linear-gradient(0deg,rgba(95,22,255,0.5),rgba(182,22,255,0.25));height:24px;display:inline-block;padding:8px;padding-bottom:0px;font-variant:small-caps;color:#b76fff;text-shadow:0px 1px 2px #1b0031;" href="//dashnet.org" target="_blank" id="topbarDashnet">DashNet</a></div>
            <div><a href="">Cookie Clicker</a>&trade; &copy; <a href="//orteil.dashnet.org" target="_blank" id="topbarOrteil">Orteil</a>, 2026</div>
            <div id="topbarOtherVersions" style="float:right;z-index:10000000;" class="hoverer">
                Other versions
                <div class="hoverable">
                    <a href="../" target="_blank" id="linkVersionLive">Live version</a>
                </div>
            </div>
            <div id="topBarEnd" style="float:right;padding:0px;"></div>
        </div>
        <div id="game">
            <div id="versionNumber" class="title"></div>
            <script>document.getElementById('versionNumber').innerHTML='v. '+VERSION;<\/script>
            <div id="offGameMessageWrap">
                <div id="offGameMessage">
                    <div id="loader">
                        <div class="spinnyBig"></div>
                        <div class="spinnySmall"></div>
                        <div id="loading" class="title">Loading...</div>
                        <div id="failedToLoad" class="title">This is taking longer than expected.<br>
                        <div style="font-size:65%;line-height:120%;">Slow connection? If not, please make sure your javascript is enabled, then refresh.</div></div>
                    </div>
                </div>
            </div>
            <canvas id="backgroundCanvas"></canvas>
            <div id="goldenCookie" class="goldenCookie"></div>
            <div id="seasonPopup" class="seasonPopup"></div>
            <div id="shimmers"></div>
            <div id="alert"></div>
            <div id="particles"></div>
            <div id="sparkles" class="sparkles"></div>
            <div id="notes"></div>
            <div id="darken"></div>
            <div id="toggleBox" class="framed prompt"></div>
            <div id="promptAnchor"><div id="prompt" class="framed"><div id="promptContent"></div><div id="promptClose" class="close" style="display:none;" onclick="PlaySound('snd/tickOff.mp3');Game.ClosePrompt();">x</div></div></div>
            <div id="ascend">
                <div id="ascendBG"></div>
                <div id="ascendZoomable"><div id="ascendContent"><div id="ascendUpgrades" style="position:absolute;"></div></div></div>
                <div id="ascendOverlay"></div>
            </div>
            <div id="debug"><div id="devConsole" class="framed"></div><div id="debugLog"></div></div>
            <div id="sectionLeft" class="inset">
                <canvas id="backgroundLeftCanvas" style="z-index:5;"></canvas>
                <div class="blackFiller"></div>
                <div class="blackGradient"></div>
                <div id="sectionLeftInfo"></div>
                <div id="cookies" class="title"></div>
                <div id="bakeryNameAnchor"><div id="bakeryName" class="title"></div></div>
                <div id="specialPopup" class="framed prompt offScreen"></div>
                <div id="buffs" class="crateBox"></div>
                <div id="cookieAnchor">
                    <button id="bigCookie"></button>
                    <div id="cookieNumbers"></div>
                </div>
                <div id="sectionLeftExtra"></div>
            </div>
            <div class="separatorLeft" id="leftBeam"></div>
            <div class="separatorRight" id="rightBeam"></div>
            <div id="sectionMiddle" class="inset">
                <div id="comments" class="inset title">
                    <div id="prefsButton" class="panelButton"><div class="subButton">Options</div></div>
                    <div id="statsButton" class="panelButton"><div>Stats</div></div>
                    <div id="logButton" class="panelButton"><div>Info</div><div id="checkForUpdate">New update!</div></div>
                    <div id="legacyButton" class="panelButton"><div class="subButton">Legacy</div><div id="ascendMeterContainer" class="smallFramed meterContainer"><div id="ascendMeter" class="meter filling"></div></div><div class="roundedPanel" id="ascendNumber"></div><div id="ascendTooltip" class="framed"></div></div>
                    <div id="commentsText">
                        <div id="commentsText1" class="commentsText"></div>
                        <div id="commentsText2" class="commentsText"></div>
                    </div>
                    <div class="separatorBottom"></div>
                </div>
                <div id="centerArea">
                    <div id="buildingsTitle" class="inset title zoneTitle">Buildings</div>
                    <div id="buildingsMaster"></div>
                    <div id="rows"></div>
                    <div id="menu"></div>
                </div>
            </div>
            <div id="sectionRight" class="inset">
                <div id="store">
                    <div id="storeTitle" class="inset title zoneTitle">Store</div>
                    <div id="toggleUpgrades" class="storeSection upgradeBox"></div>
                    <div id="techUpgrades" class="storeSection upgradeBox"></div>
                    <div id="vaultUpgrades" class="storeSection upgradeBox"></div>
                    <div id="upgrades" class="storeSection upgradeBox"></div>
                    <div id="products" class="storeSection"></div>
                </div>
            </div>
            <div id="tooltipAnchor"><div id="tooltip" class="framed" onMouseOut="Game.tooltip.hide();"></div></div>
            <div id="preloadImages" style="display:none;"></div>
        </div>
    </div>
</body>
</html>`;

            iframe.srcdoc = cookieHtml;
        }

        function initTicTacToe() {
            let board = ['', '', '', '', '', '', '', '', ''];
            let currentPlayer = 'X';
            let gameActive = true;

            const html = `
                <div class="flex flex-col items-center bg-cardBg p-8 rounded-2xl border border-slate-700 shadow-2xl max-w-md w-full">
                    <div class="flex justify-between w-full mb-8">
                        <div class="text-center">
                            <span class="text-xs text-slate-400 font-bold uppercase tracking-widest block mb-1">Player 1</span>
                            <span class="text-4xl font-black text-neonBlue" style="text-shadow: 0 0 10px rgba(0,243,255,0.5)">X</span>
                        </div>
                        <div class="text-center">
                            <span class="text-xs text-slate-400 font-bold uppercase tracking-widest block mb-1">Player 2</span>
                            <span class="text-4xl font-black text-neonPink" style="text-shadow: 0 0 10px rgba(255,0,234,0.5)">O</span>
                        </div>
                    </div>
                    
                    <div id="ttt-status" class="text-xl font-bold mb-6 text-white h-8">Player <span class="${currentPlayer === 'X' ? 'text-neonBlue' : 'text-neonPink'}">${currentPlayer}</span>'s Turn</div>
                    
                    <div class="grid grid-cols-3 gap-3 bg-slate-800 p-3 rounded-xl mb-8">
                        ${[0,1,2,3,4,5,6,7,8].map(i => `
                            <button id="cell-${i}" class="ttt-cell w-20 h-20 sm:w-24 sm:h-24 bg-darkBg rounded-lg flex items-center justify-center text-5xl font-black cursor-pointer shadow-inner"></button>
                        `).join('')}
                    </div>
                    
                    <button id="ttt-reset" class="bg-slate-700 hover:bg-slate-600 text-white font-bold py-2 px-8 rounded-full transition w-full">Restart Game</button>
                </div>
            `;
            document.getElementById('gameContainer').innerHTML = html;

            const statusDisplay = document.getElementById('ttt-status');
            const cells = document.querySelectorAll('.ttt-cell');
            const winningConditions = [
                [0, 1, 2], [3, 4, 5], [6, 7, 8],
                [0, 3, 6], [1, 4, 7], [2, 5, 8],
                [0, 4, 8], [2, 4, 6]
            ];

            function handleCellClick(e) {
                const cell = e.target;
                const cellIndex = parseInt(cell.id.split('-')[1]);
                if (board[cellIndex] !== '' || !gameActive) return;

                board[cellIndex] = currentPlayer;
                cell.innerText = currentPlayer;
                cell.classList.add(currentPlayer === 'X' ? 'text-neonBlue' : 'text-neonPink');
                cell.style.textShadow = currentPlayer === 'X' ? '0 0 15px rgba(0,243,255,0.7)' : '0 0 15px rgba(255,0,234,0.7)';

                checkWin();
            }

            function checkWin() {
                let roundWon = false;
                for (let i = 0; i <= 7; i++) {
                    const [a, b, c] = [board[winningConditions[i][0]], board[winningConditions[i][1]], board[winningConditions[i][2]]];
                    if (a && a === b && b === c) { roundWon = true; break; }
                }

                if (roundWon) {
                    statusDisplay.innerHTML = `<span class="${currentPlayer === 'X' ? 'text-neonBlue' : 'text-neonPink'}">Player ${currentPlayer} Wins!</span>`;
                    gameActive = false;
                    return;
                }

                if (!board.includes('')) {
                    statusDisplay.innerHTML = 'Game ended in a Draw!';
                    gameActive = false;
                    return;
                }

                currentPlayer = currentPlayer === 'X' ? 'O' : 'X';
                statusDisplay.innerHTML = `Player <span class="${currentPlayer === 'X' ? 'text-neonBlue' : 'text-neonPink'}">${currentPlayer}</span>'s Turn`;
            }

            cells.forEach(cell => cell.addEventListener('click', handleCellClick));
            
            document.getElementById('ttt-reset').addEventListener('click', () => {
                board = ['', '', '', '', '', '', '', '', ''];
                currentPlayer = 'X';
                gameActive = true;
                statusDisplay.innerHTML = `Player <span class="text-neonBlue">X</span>'s Turn`;
                cells.forEach(cell => {
                    cell.innerText = '';
                    cell.className = 'ttt-cell w-20 h-20 sm:w-24 sm:h-24 bg-darkBg rounded-lg flex items-center justify-center text-5xl font-black cursor-pointer shadow-inner';
                    cell.style.textShadow = 'none';
                });
            });
        }

        function initEmojiMatch() {
            const emojis = ['👾', '🤖', '🚀', '👽', '🛸', '🕹️', '🔮', '🔋'];
            let cardsArray = [...emojis, ...emojis].sort(() => 0.5 - Math.random());
            let flippedCards = [], matchedCount = 0, canFlip = true, moves = 0;

            const html = `
                <div class="flex flex-col items-center bg-cardBg p-6 sm:p-8 rounded-2xl border border-slate-700 shadow-2xl max-w-xl w-full">
                    <div class="flex justify-between items-center w-full mb-6 text-white font-bold">
                        <div class="text-lg bg-slate-800 px-4 py-2 rounded-lg border border-slate-700">Moves: <span id="mem-moves" class="text-brand">0</span></div>
                        <button id="mem-reset" class="bg-brand hover:bg-brandHover py-2 px-4 rounded-lg transition text-sm">Restart</button>
                    </div>
                    
                    <div id="mem-grid" class="grid grid-cols-4 gap-2 sm:gap-4 w-full">
                        ${cardsArray.map((emoji, i) => `
                            <div class="memory-card relative w-16 h-16 sm:w-20 sm:h-20 sm:h-24 cursor-pointer" data-index="${i}" data-emoji="${emoji}">
                                <div class="memory-card-front absolute inset-0 bg-gradient-to-br from-brand to-purple-600 rounded-xl flex items-center justify-center text-3xl sm:text-4xl shadow-lg border border-purple-400/30">${emoji}</div>
                                <div class="memory-card-back absolute inset-0 bg-slate-800 rounded-xl flex items-center justify-center border border-slate-700 shadow-inner hover:bg-slate-700 transition"><i class="ph-fill ph-question text-slate-500 text-2xl"></i></div>
                            </div>
                        `).join('')}
                    </div>
                    
                    <div id="mem-win" class="hidden mt-6 text-center">
                        <h3 class="text-2xl font-black text-transparent bg-clip-text bg-gradient-to-r from-green-400 to-emerald-600 mb-2">Memory Master!</h3>
                        <p class="text-slate-400 text-sm">You completed the grid.</p>
                    </div>
                </div>
            `;
            document.getElementById('gameContainer').innerHTML = html;

            const cards = document.querySelectorAll('.memory-card');
            const movesDisplay = document.getElementById('mem-moves');
            const winDisplay = document.getElementById('mem-win');

            cards.forEach(card => card.addEventListener('click', (e) => {
                const c = e.currentTarget;
                if (!canFlip || c.classList.contains('flipped') || flippedCards.includes(c)) return;

                c.classList.add('flipped');
                flippedCards.push(c);

                if (flippedCards.length === 2) {
                    canFlip = false;
                    movesDisplay.innerText = ++moves;
                    
                    if (flippedCards[0].dataset.emoji === flippedCards[1].dataset.emoji) {
                        matchedCount += 2;
                        flippedCards = [];
                        canFlip = true;
                        if (matchedCount === cardsArray.length) winDisplay.classList.remove('hidden');
                    } else {
                        setTimeout(() => {
                            flippedCards[0].classList.remove('flipped');
                            flippedCards[1].classList.remove('flipped');
                            flippedCards = [];
                            canFlip = true;
                        }, 1000);
                    }
                }
            }));
            
            document.getElementById('mem-reset').addEventListener('click', initEmojiMatch);
        }

        // --- 7. START APP ---
        renderCategories();
        renderGames();

    </script>
</body>
</html>
